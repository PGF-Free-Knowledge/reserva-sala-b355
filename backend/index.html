<script>

let semanaOffset = 0;
let mesOffset = 0;
let reservaSeleccionada = null;

// --------------------- RESERVAR ---------------------
function reservar(){
    const data = {
        fecha: document.getElementById("fecha").value,
        hora_inicio: document.getElementById("inicio").value,
        hora_fin: document.getElementById("fin").value,
        responsable: document.getElementById("responsable").value,
        grupo: document.getElementById("grupo").value,
        email: document.getElementById("email").value
    };

    fetch("/reservas", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(data)
    })
    .then(res => {
        if(!res.ok) throw new Error();
        return res.json();
    })
    .then(()=>{
        alert("Reserva creada");
        cargarReservas();
    })
    .catch(()=>alert("Error al guardar"));
}

// --------------------- SEMANA ---------------------
function cambiarSemana(dir){
    semanaOffset += dir;
    cargarReservas();
}

// --------------------- MES ---------------------
function cambiarMes(dir){
    mesOffset += dir;
    cargarReservas();
}

// --------------------- CARGAR RESERVAS ---------------------
function cargarReservas(){

fetch("/reservas")
.then(res => res.json())
.then(data => {

    let inicioSemana = new Date();
    inicioSemana.setHours(0,0,0,0);
    let diaActual = inicioSemana.getDay() === 0 ? 6 : inicioSemana.getDay()-1;
    inicioSemana.setDate(inicioSemana.getDate() - diaActual + semanaOffset*7);

    let finSemana = new Date(inicioSemana);
    finSemana.setDate(finSemana.getDate() + 4);

    document.getElementById("semanaTexto").innerText =
        inicioSemana.toISOString().split("T")[0] + " - " +
        finSemana.toISOString().split("T")[0];

    const cont = document.getElementById("calendario");
    cont.innerHTML = "";

    const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes"];

    cont.appendChild(document.createElement("div"));

    dias.forEach((d,i)=>{
        let f = new Date(inicioSemana);
        f.setDate(f.getDate()+i);
        let div = document.createElement("div");
        div.innerText = `${d} ${f.getDate()}/${f.getMonth()+1}`;
        div.style.textAlign="center";
        div.style.fontWeight="bold";
        div.style.background="#e9ecef";
        cont.appendChild(div);
    });

    for(let h=8; h<=18; h++){
        let hora=document.createElement("div");
        hora.innerText=`${h}:00`;
        cont.appendChild(hora);

        dias.forEach((d,i)=>{
            let celda=document.createElement("div");
            celda.style.height="40px";
            celda.style.border="1px solid #ddd";

            data.forEach(r=>{
                let ini=parseInt(r.hora_inicio);
                let fin=parseInt(r.hora_fin);

                let f=new Date(inicioSemana);
                f.setDate(f.getDate()+i);

                let fechaStr=f.toISOString().split("T")[0];

                if(r.fecha===fechaStr && ini===h){
                    let bloque=document.createElement("div");
                    bloque.style.background="#4dabf7";
                    bloque.style.height=(fin-ini)*40+"px";
                    bloque.style.color="white";
                    bloque.innerHTML=`<b>${r.grupo}</b>`;
                    celda.appendChild(bloque);
                }
            });

            cont.appendChild(celda);
        });
    }

    cargarCalendario3Meses(data);

});
}

// --------------------- 3 MESES ---------------------
function cargarCalendario3Meses(reservas){

    const cont=document.getElementById("calendario3Meses");
    cont.innerHTML="";

    let base=new Date();
    base.setDate(1);
    base.setMonth(base.getMonth()+mesOffset);

    document.getElementById("mesTexto").innerText =
        base.toLocaleString('es-ES',{month:'long',year:'numeric'});

    for(let m=0;m<3;m++){

        let mes=new Date(base.getFullYear(),base.getMonth()+m,1);

        let divMes=document.createElement("div");
        divMes.style.background="white";
        divMes.style.padding="10px";
        divMes.style.borderRadius="10px";

        let titulo=document.createElement("h4");
        titulo.innerText=mes.toLocaleString('es-ES',{month:'long',year:'numeric'});
        titulo.style.textAlign="center";

        divMes.appendChild(titulo);

        let grid=document.createElement("div");
        grid.style.display="grid";
        grid.style.gridTemplateColumns="repeat(7,1fr)";
        grid.style.gap="3px";

        let ultimo=new Date(mes.getFullYear(),mes.getMonth()+1,0);

        for(let d=1;d<=ultimo.getDate();d++){

            let fecha=new Date(mes.getFullYear(),mes.getMonth(),d);
            let fechaStr=fecha.toISOString().split("T")[0];

            let celda = document.createElement("div");

            celda.style.padding = "5px";
            celda.style.textAlign = "center";
            celda.style.borderRadius = "5px";
            celda.style.fontSize = "12px";
            celda.style.cursor = "pointer";

            let reservasDia = reservas.filter(r => r.fecha === fechaStr);

            if(reservasDia.length > 0){
                celda.style.background = "#ff6b6b";
                celda.style.color = "white";
                celda.innerHTML = `<b>${d}</b><br>${reservasDia.length}`;
            } else {
                celda.style.background = "#d3f9d8";
                celda.innerHTML = `<b>${d}</b>`;
            }

            celda.addEventListener("click", () => {
                document.getElementById("fecha").value = fechaStr;
                document.getElementById("inicio").value = "08:00";
                document.getElementById("fin").value = "10:00";

                window.scrollTo({ top: 0, behavior: "smooth" });
            });

            grid.appendChild(celda);
        }

        divMes.appendChild(grid);
        cont.appendChild(divMes);
    }
}

window.onload = cargarReservas;

</script>
